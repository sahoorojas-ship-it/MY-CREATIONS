<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek CPS Tester</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: #0f0f12;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: #17171c;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 400px;
        }

        h1 {
            color: #a855f7;
            font-size: 2rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: #22222a;
            padding: 15px;
            border-radius: 12px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #9ca3af;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        /* The Main Interactive Clicking Area */
        #click-zone {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s ease, opacity 0.2s;
        }

        #click-zone:active {
            transform: scale(0.97);
        }

        #click-zone.disabled {
            background: #2b2b36;
            color: #6b7280;
            cursor: not-allowed;
            transform: none;
        }

        #reset-btn {
            margin-top: 25px;
            background: transparent;
            border: 2px solid #4b5563;
            color: #e5e7eb;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        #reset-btn:hover {
            border-color: #a855f7;
            color: #a855f7;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CPS TESTER</h1>
    
    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">Timer</div>
            <div id="timer-val" class="stat-value">5.0s</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Your CPS</div>
            <div id="cps-val" class="stat-value">0.0</div>
        </div>
    </div>

    <div id="click-zone">CLICK HERE TO START</div>

    <button id="reset-btn" onclick="resetTest()">Reset Test</button>
</div>

<script>
    // Configuration Variables
    const TEST_DURATION = 5.0; // Seconds the test lasts
    
    let clicks = 0;
    let timeLeft = TEST_DURATION;
    let timerInterval = null;
    let isPlaying = false;
    let isGameOver = false;

    const clickZone = document.getElementById('click-zone');
    const timerDisplay = document.getElementById('timer-val');
    const cpsDisplay = document.getElementById('cps-val');

    // Handle user clicks on the main target pad
    clickZone.addEventListener('mousedown', function() {
        if (isGameOver) return;

        // First click triggers the countdown loop
        if (!isPlaying) {
            startTimer();
        }

        clicks++;
        updateLiveCPS();
    });

    function startTimer() {
        isPlaying = true;
        clickZone.textContent = "CLICK FAST!";
        
        const startTime = Date.now();
        
        timerInterval = setInterval(() => {
            // Calculate true elapsed time using absolute system clock differences
            let elapsed = (Date.now() - startTime) / 1000;
            timeLeft = TEST_DURATION - elapsed;

            if (timeLeft <= 0) {
                endGame();
            } else {
                timerDisplay.textContent = timeLeft.toFixed(1) + "s";
                updateLiveCPS();
            }
        }, 50); // Updates every 50ms for hyper-smooth visual countdowns
    }

    function updateLiveCPS() {
        if (clicks === 0) return;
        
        let timePassed = TEST_DURATION - timeLeft;
        if (timePassed <= 0) timePassed = 0.05; // Prevent dividing by zero at frame 1
        
        let currentCPS = clicks / timePassed;
        cpsDisplay.textContent = currentCPS.toFixed(1);
    }

    function endGame() {
        clearInterval(timerInterval);
        isPlaying = false;
        isGameOver = true;
        
        timeLeft = 0;
        timerDisplay.textContent = "0.0s";
        
        // Final absolute score formula
        let finalCPS = clicks / TEST_DURATION;
        cpsDisplay.textContent = finalCPS.toFixed(1);
        
        clickZone.textContent = `Finished! Score: ${finalCPS.toFixed(1)}`;
        clickZone.classList.add('disabled');
    }

    function resetTest() {
        clearInterval(timerInterval);
        clicks = 0;
        timeLeft = TEST_DURATION;
        isPlaying = false;
        isGameOver = false;
        
        timerDisplay.textContent = TEST_DURATION.toFixed(1) + "s";
        cpsDisplay.textContent = "0.0";
        clickZone.textContent = "CLICK HERE TO START";
        clickZone.classList.remove('disabled');
    }
</script>

</body>
</html>
