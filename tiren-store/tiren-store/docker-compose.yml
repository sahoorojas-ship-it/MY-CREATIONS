version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tiren-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tiren_admin
      POSTGRES_PASSWORD: tiren_secure_pass
      POSTGRES_DB: tiren_store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiren_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tiren-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://tiren_admin:tiren_secure_pass@postgres:5432/tiren_store
      JWT_SECRET: ${JWT_SECRET:-tiren-store-production-secret}
      JWT_EXPIRES: 7d
      FRONTEND_URL: http://localhost:3000
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tiren-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend

volumes:
  postgres_data:
